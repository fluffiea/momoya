# momoya-gateway
# 挂载：./nginx.conf -> /etc/nginx/nginx.conf
# 证书：./certs -> /etc/nginx/certs
#
# 与 /opt/momoya/web 栈对齐：momoya.store 的 /api/* → momoya-web-api:4000（本仓库 Express），/ → momoya-web:80。

user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # 单个 worker 的最大连接数；高并发时同时确认容器/宿主机 ulimit。
    worker_connections 1024;

    # 容器运行在 Linux 上，显式使用 epoll 并批量接收新连接。
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 基础传输：减少磁盘/网络系统调用，隐藏版本号。
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    types_hash_max_size 4096;
    server_tokens off;

    # 客户端超时：限制慢速连接长期占用 worker。
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;
    keepalive_timeout     65s;
    reset_timedout_connection on;

    # 日志默认写入容器内；需要长期保留时挂载 /var/log/nginx。
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # 仅压缩文本类响应；图片/压缩包等二进制内容不在这里处理。
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;

    # WebSocket 请求使用 upgrade；普通 HTTP 请求保持空 Connection，才能复用 upstream keepalive。
    map $http_upgrade $proxy_connection {
        default upgrade;
        ''      "";
    }

    # 上游 keepalive 复用网关到服务容器的 TCP 连接。
    upstream momoya_web {
        server momoya-web:80;
        keepalive 16;
    }

    upstream momoya_server {
        server momoya-server:3000;
        keepalive 32;
    }

    # 本仓库 monorepo API（docker-compose 容器名 momoya-web-api，与 web 同栈）
    upstream momoya_web_api {
        server momoya-web-api:4000;
        keepalive 16;
    }

    # 代理通用头：让后端拿到原始 Host、客户端 IP、协议和 WebSocket 升级信息。
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $proxy_connection;
    proxy_hide_header X-Powered-By;

    # API 限流：按客户端 IP 计数，主要防刷接口/撞库；burst 见 API location。
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_status 429;

    # TLS 默认值：TLS 1.2/1.3，证书在各 server 中单独指定。
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    # 禁用 ticket，避免密钥轮换前旧 ticket 长期有效。
    ssl_session_tickets off;
    ssl_buffer_size 4k;

    # 使用公网 CA 且证书链完整后，可启用 OCSP Stapling。
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # 80 默认站点：未知 Host / 直连 IP 直接断开。
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # 已知域名统一跳转 HTTPS。
    server {
        listen 80;
        server_name momoya.store api.momoya.store;

        # Let’s Encrypt HTTP-01：挂载 webroot 后再启用。
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 443 默认站点：未知 SNI 拒绝握手，避免暴露错误证书。
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
    }

    # 主站：momoya.store -> momoya-web。
    server {
        # nginx 1.25.1+ 推荐 http2 与 listen 分开写。
        listen 443 ssl;
        http2 on;
        server_name momoya.store;

        ssl_certificate     /etc/nginx/certs/momoya.crt;
        ssl_certificate_key /etc/nginx/certs/momoya.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        client_max_body_size 12m;

        location ^~ /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://momoya_web_api;

            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        location / {
            proxy_pass http://momoya_web;
        }
    }

    # API：api.momoya.store -> momoya-server，支持 WebSocket 并启用限流。
    server {
        listen 443 ssl;
        http2 on;
        server_name api.momoya.store;

        ssl_certificate     /etc/nginx/certs/api.momoya.crt;
        ssl_certificate_key /etc/nginx/certs/api.momoya.key;

        client_max_body_size 5m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://momoya_server;

            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
