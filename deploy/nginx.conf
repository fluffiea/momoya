# ─────────────────────────────────────────────────────────────────────────────
# Momoya 前端 nginx 配置
#
# - 反代 /api/* → api:4000，保留原始 Host 与协议头，让 Express
#   `app.set('trust proxy', 1)` 正确识别真实客户端 IP / scheme。
# - SPA: 任何未命中静态资源的路径回退到 index.html。
# - 文件上传：/api/profile/avatar、/api/daily/entries 都接收图片，
#   client_max_body_size 放到 12M（前端限制 3M，留余量）。
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 防御性：限制单请求体大小，避免恶意大文件
    client_max_body_size 12m;

    # ── 静态资源 ────────────────────────────────────────────────────────────
    # Vite 产出的 assets/*-<hash>.<ext> 永远可以长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SVG / 图标等也长缓存
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── API 反代 ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE 实时事件：禁用代理缓冲，超时拉长
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
        # index.html 不缓存，保证发版后用户立即拿到最新入口
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
