# ─────────────────────────────────────────────────────────────────────────────
# Momoya 前端 nginx 配置（HTTPS）
#
# 行为：
# - 80 端口：永久跳转到 https://（仅当未备案的国内服务器 80 不通时，浏览器
#   也用不到这块；纯粹是给将来备案后/海外用户兜底）。
# - 443 端口：正式入口，挂 SSL；其余配置（SPA + /api 反代 + SSE 不缓冲）
#   保持不变。
#
# SSL 证书路径约定（容器内）：
#   /etc/nginx/certs/cert.crt   ← 包含证书链（腾讯云 Nginx 格式的 _bundle.crt）
#   /etc/nginx/certs/cert.key   ← 私钥
# ─────────────────────────────────────────────────────────────────────────────

# ── 80 → 443 跳转 ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME http-01 challenge 留口（你目前用腾讯云证书不需要，但保留以备万一）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 443 HTTPS 主服务 ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/cert.key;

    # 现代 TLS 配置（参考 Mozilla intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # HSTS：强制半年内只走 HTTPS（注意：上线后短期内不要随便撤回 HTTPS）
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # 单请求体限制（前端图片限到 3M，这里留余量）
    client_max_body_size 12m;

    # ── 静态资源 ────────────────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── API 反代 ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE 实时事件：禁用代理缓冲，超时拉长
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
