# ─────────────────────────────────────────────────────────────────────────────
# Momoya 前端容器内 nginx（仅静态 SPA，监听 80）
#
# TLS 与 /api 反代由宿主机上的 momoya-gateway 处理：
#   - https://momoya.store/        → momoya-web:80（本容器）
#   - https://momoya.store/api/*   → momoya-web-api:4000（由你服务器上的网关 nginx 配置，见 README）
#
# 不在此做 301→https，避免网关 HTTP 反代环。
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
