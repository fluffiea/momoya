# ─────────────────────────────────────────────────────────────────────────────
# 本地开发用 compose：只起 MongoDB，配合 `pnpm dev` 在宿主机跑 web/api
# 生产部署请使用 docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - momoya_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: momoya
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

volumes:
  momoya_mongo_data:
