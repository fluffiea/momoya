# 构建 api / web 镜像并推送到 GHCR。服务器上只需 pull + up，无需在机器上编译。
#
name: Publish Docker images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR 镜像名必须小写
      - name: Set image base names
        id: meta
        run: |
          OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ env.REGISTRY }}/${OWNER_LC}/momoya-api" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ env.REGISTRY }}/${OWNER_LC}/momoya-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:latest
            ${{ steps.meta.outputs.api_image }}:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:latest
            ${{ steps.meta.outputs.web_image }}:${{ github.sha }}
