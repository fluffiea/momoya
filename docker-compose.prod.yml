# ─────────────────────────────────────────────────────────────────────────────
# Momoya 生产 compose（mongo + api + web）
#
# 服务器建议：仓库根放在 /opt/momoya/web，与本机 git push / pull 同步部署。
# 网关：web 容器名必须为 momoya-web，且加入外部网络 momoya-bridge，供 Nginx 反代。
# 变量见 .env.production.example → 复制为 .env.production，compose 使用 --env-file。
# ─────────────────────────────────────────────────────────────────────────────

name: momoya

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - momoya_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: momoya
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  api:
    # 服务名 api 保留在默认 compose 网络内；容器名供网关反代 momoya.store/api → momoya-web-api:4000
    container_name: momoya-web-api
    image: ${MOMOYA_IMAGE_PREFIX:?MOMOYA_IMAGE_PREFIX 必填}/momoya-api:${MOMOYA_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/momoya
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET 必填}
      PROFILE_SECRET_KEY: ${PROFILE_SECRET_KEY:?PROFILE_SECRET_KEY 必填}
      UPLOADS_DIR: /app/uploads
    volumes:
      - momoya_uploads:/app/uploads
    networks:
      - default
      - momoya-bridge # 供网关将 https://momoya.store/api/* 反代到 momoya-web-api:4000

  web:
    container_name: momoya-web # 必须匹配 gateway 里的配置
    image: ${MOMOYA_IMAGE_PREFIX:?MOMOYA_IMAGE_PREFIX 必填}/momoya-web:${MOMOYA_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # 1. 移除了 80/443 端口，交给网关
    # 2. 移除了证书映射，交给网关
    networks:
      - default         # 连接内部的 momoya-web-api
      - momoya-bridge   # 连接外部的 momoya-gateway
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  momoya_mongo_data:
  momoya_uploads:

networks:
  momoya-bridge:
    external: true